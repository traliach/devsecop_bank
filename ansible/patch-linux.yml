---
- name: Patch and configure application hosts
  hosts: app
  become: true
  gather_facts: true

  tasks:
    - name: Refresh the APT package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade installed packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Install Java and Docker
      ansible.builtin.apt:
        name:
          - openjdk-21-jdk
          - docker.io
        state: present

    - name: Ensure Docker is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add Ubuntu user to Docker group
      ansible.builtin.user:
        name: ubuntu
        groups:
          - docker
        append: true
